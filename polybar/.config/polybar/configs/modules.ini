[module/updates-pacman-aurhelper]
type = custom/script
exec = ~/.config/polybar/scripts/updates-pacman-aurhelper.sh
interval = 600
format-padding = 0
format-background = ${color.shade}
format-foreground = ${color.green}
format-prefix = "’ÆÜ"
format-prefix-font = 3
format-prefix-foreground = ${color.green}


[module/docker-pane-icon]
type = custom/text
content-background = ${color.blue}
content-foreground = ${color.shade}
content = "’īł"
content-font = 5
content-padding = 0
;
;
[module/docker-pane]
type = custom/script
exec = docker ps -q | wc -l
interval = 1
label = %output%
format-padding = 0
format-background = ${color.shade}
format-foreground = ${color.blue}


[module/pomodo]
type = custom/text
content = ŅĆü
content-background = ${color.shade}
content-foreground = ${color.red}
content-font = 3
content-padding = 1
click-left = ~/.config/polybar/scripts/pomo_toggle_show.sh &
click-right = ~/.config/polybar/scripts/pomo_toggle_show.sh &
;
;
[module/redshift]
type = custom/script
format-prefix = "’åå "
format-prefix-font = 3
format-prefix-foreground = ${color.yellow}
format-background = ${color.shade}
format-foreground = ${color.yellow}
exec = source ~/.config/polybar/scripts/env.sh && ~/.config/polybar/scripts/redshift.sh temperature 
click-left = source ~/.config/polybar/scripts/env.sh && ~/.config/polybar/scripts/redshift.sh toggle 
scroll-up = source ~/.config/polybar/scripts/env.sh && ~/.config/polybar/scripts/redshift.sh increase
scroll-down = source ~/.config/polybar/scripts/env.sh && ~/.config/polybar/scripts/redshift.sh decrease
interval=0.5


[module/info-kernel]
type = custom/script
exec = uname -r
interval = 1024
format-background = ${color.shade}
format-foreground = ${color.cyan}
format-prefix = "’ģ╝ "
format-prefix-font = 3
format-prefix-foreground = ${color.cyan}


[module/bspwm]
type = internal/bspwm
pin-workspaces = true
enable-click = true
enable-scroll = true
content-font = 4
format = <label-state>
label-background = ${color.shade}
label-empty-padding = 0
label-empty-font = 4
label-empty-foreground = ${color.black}
label-empty-background = ${color.shade}
label-focused-padding = 0
label-focused-font = 4
label-focused-foreground = ${color.white}
label-focused-background = ${color.shade}
label-urgent-padding = 0
label-urgent-font = 4
label-urgent-foreground = ${color.red}
label-urgent-background = ${color.shade}
label-occupied-padding = 0
jabel-occupied-font = 4
label-occupied-foreground = ${color.blue}
label-occupied-background = ${color.shade}

[module/ibus]
type = custom/ipc
hook-0 = ~/.config/polybar/scripts/ibus.sh
format-prefix = "Ņćā "
format-prefix-font = 3
format-prefix-foreground = ${color.orange}
format-background = ${color.shade}
format-foreground = ${color.orange}
click-left = ~/.scripts/ibus_toggle.sh &
click-right = ~/.scripts/ibus_toggle.sh &

[module/ibus-trigger]
type = custom/script
exec = polybar-msg hook ibus 1 &>/dev/null

[module/bluetooth]
type = custom/script
exec = ~/.config/rofi/rofi-bluetooth/rofi-bluetooth --status
interval = 1
click-left = ~/.config/rofi/rofi-bluetooth/rofi-bluetooth &
format-background = ${color.shade}
format-foreground = ${color.cyan}
