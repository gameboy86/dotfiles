[module/alsa]
type = internal/alsa
master-soundcard = default
speaker-soundcard = default
headphone-soundcard = default
master-mixer = Master
interval = 5
format-volume = <ramp-volume> <label-volume>
format-volume-background = ${color.shade}
format-volume-foreground = ${color.magenta}
format-volume-padding = 0
format-muted = <label-muted>
format-muted-prefix = "’ŗó "
format-muted-prefix-font = 3
format-muted-prefix-background = ${color.shade}
format-muted-prefix-foreground = ${color.magenta}
format-muted-padding = 0
label-volume = %percentage%%
label-muted = "MUTED"
label-muted-foreground = ${color.magenta}
format-muted-background = ${color.shade}
ramp-volume-0 = "’Ü©"
ramp-volume-1 = "’Ć©"
ramp-volume-2 = "’Ć©"
ramp-volume-font = 3
ramp-headphones-0 = ’¢Å


[module/protonvpn]
type = custom/script
exec = ~/.config/polybar/scripts/protonvpn.sh
interval = 1
format-foreground = ${color.red}
format-background = ${color.shade}
format-prefix = ’łø
format-prefix-font = 3
format-padding = 0


[module/battery]
type = internal/battery
battery = BAT1
adapter = ADP1
full-at = 95


format-full-background = ${color.shade}
format-full = ’ć”<label-full>
label-full = %percentage%%

format-charging-background = ${color.shade}
format-charging = <animation-charging> <label-charging>
label-charging = %percentage%%

format-discharging-background = ${color.shade}
format-discharging = <ramp-capacity> <label-discharging>
label-discharging = %percentage%%

ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ

bar-capacity-width = 10

animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ

animation-charging-framerate = 750

animation-discharging-0 = ’ēĆ
animation-discharging-1 = ’ēü
animation-discharging-2 = ’ēé
animation-discharging-3 = ’ēā
animation-discharging-4 = ’ēä
animation-discharging-framerate = 500


[module/cpu]
type = internal/cpu
interval = 1
format-prefix = ’ŗø
format-prefix-font = 3
format-foreground = ${color.green}
format-background = ${color.shade}
format-padding = 0
label = " %percentage%%"


[module/date]
type = internal/date
interval = 1.0
time = " %I:%M %p"
time-alt = " %a, %d %b %Y"
format = <label>
format-prefix = ’ĆŚ
format-prefix-font = 3
format-foreground = ${color.orange}
format-background = ${color.shade}
format-padding = 0
label = %time%


[module/memory]
type = internal/memory
interval = 1
format = <label> 
format-prefix = ’öĖ
format-prefix-font = 3
format-padding = 0
format-foreground = ${color.cyan}
format-background = ${color.shade}
label = " %gb_used%"


[module/temperature]
type = internal/temperature
interval = 0.5
hwmon-path = /sys/devices/platform/coretemp.0/hwmon/hwmon8/temp1_input
warn-temperature = 70
units = true
format = <ramp> <label>
format-foreground = ${color.magenta}
format-background = ${color.shade}
format-padding = 0
format-warn = <ramp> <label-warn>
format-warn-padding = 0
format-warn-foreground = ${color.red}
format-warn-background = ${color.shade}
label = %temperature-c%
label-warn = "%temperature-c%"
ramp-0 = ’üŁ
ramp-1 = ’üŁ
ramp-2 = ’üŁ
ramp-3 = ’üŁ
ramp-4 = ’üŁ
ramp-font = 3

[module/title]
type = internal/xwindow
format = <label>
format-prefix =
format-prefix-font = 2
format-prefix-background = ${color.shade8}
format-prefix-foreground = #0a0a0a
format-prefix-padding = 0
label = "%title%"
label-maxlen = 50
label-background = ${color.shade}
label-foreground = ${color.foreground}
label-padding = 0
label-empty = "Desktop"
label-empty-background = ${color.shade}
label-empty-foreground = ${color.foreground}
label-empty-padding = 0


[module/sysmenu]
type = custom/text
content = "’Ćæ"
content-background = ${color.shade}
content-foreground = ${color.red}
content-font= 3
content-padding = 0
click-left = ~/.config/rofi/powermenu.sh &


[module/wifi]
type = internal/network
interface = wlan0
unknown-as-up = true
interval = 3.0
tail = true

format-connected = "<ramp-signal><label-connected>"
format-connected-foreground = ${color.cyan}

label-connected = %essid%
label-connected-background = ${color.shade}
label-connected-foreground = ${color.cyan}


format-disconnected-prefix  = "’¬®"
format-disconnected-prefix-foreground = ${color.cyan}
format-disconnected-prefix-background = ${color.shade}
format-disconnected-foreground = ${color.cyan}
format-disconnected-background = ${color.shade}

format-disconnected = NO WIFI

ramp-signal-0 = "’ć½"
ramp-signal-foreground = ${color.cyan}
ramp-signal-background = ${color.shade}
ramp-signal-font = 3
format-padding = 2
;

